<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - La Pasadita POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">
<div class="container-fluid">
    <div class="row">
        <!-- El sidebar se insertará aquí mediante JavaScript -->
        <div id="sidebarContainer" class="col-md-3 col-lg-2 p-0"></div>

        <!-- Main content -->
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
            <!-- El header se insertará aquí mediante JavaScript -->
            <div id="headerContainer"></div>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body">
                            <h5 class="card-title">Ventas Hoy</h5>
                            <h2 class="display-4">$0.00</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body">
                            <h5 class="card-title">Pedidos Hoy</h5>
                            <h2 class="display-4">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Productos</h5>
                            <h2 class="display-4">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <h2>Ventas Recientes</h2>
            <div class="table-responsive">
                <table class="table table-striped table-sm">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td colspan="5" class="text-center">No hay ventas recientes</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- El footer se insertará aquí mediante JavaScript -->
<div id="footerContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../components/header.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/app.js"></script>
</body>
</html>
