<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - La Pasadita POS</title>
    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse" id="sidebar">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <h4 class="text-white">La Pasadita</h4>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="dashboard.html">
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active text-white" href="pos.html">
                            Punto de Venta
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="products.html">
                            Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="employees.html">
                            Empleados
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="orders.html">
                            Pedidos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="reports.html">
                            Reportes
                        </a>
                    </li>
                    <li class="nav-item mt-5">
                        <a class="nav-link text-white" href="#" onclick="logout()">
                            Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Punto de Venta</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <button type="button" class="btn btn-sm btn-outline-secondary d-md-none" data-bs-toggle="collapse"
                            data-bs-target="#sidebar">
                        Menú
                    </button>
                </div>
            </div>

            <div class="row">
                <!-- Productos -->
                <div class="col-md-8">
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Productos</h5>
                            <div class="input-group w-50">
                                <input type="text" class="form-control" placeholder="Buscar producto...">
                                <button class="btn btn-outline-secondary" type="button">Buscar</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="row" id="productsList">
                                <!-- Ejemplo de producto -->
                                <div class="col-md-4 mb-3">
                                    <div class="card product-item">
                                        <div class="card-body">
                                            <h5 class="card-title">Producto 1</h5>
                                            <p class="card-text">$10.00</p>
                                            <button class="btn btn-sm btn-primary">Agregar</button>
                                        </div>
                                    </div>
                                </div>
                                <!-- Fin ejemplo -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Carrito de compra -->
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Pedido Actual</h5>
                        </div>
                        <div class="card-body">
                            <div id="cartItems">
                                <p class="text-muted text-center">No hay productos en el carrito</p>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <h5>Total:</h5>
                                <h5 id="cartTotal">$0.00</h5>
                            </div>
                            <div class="mt-3">
                                <button class="btn btn-success w-100">Procesar Pago</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script>
    // Verificar autenticación
    document.addEventListener('DOMContentLoaded', () => {
        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }
        // Aquí iría código para cargar productos
    });
</script>
</body>
</html>
